<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>
 {% include 'navbar.html' %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="text-center mb-4">Add Doctor</h3>

       <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="name" class="form-control mb-3" placeholder="Doctor Name" required>



    <input type="text" name="field" class="form-control mb-3" placeholder="Specialization" required>

    <input type="text" name="experience" class="form-control mb-3" placeholder="Experience" required>

    <input type="text" name="qualification" class="form-control mb-3" placeholder="Qualification" required>

    <label class="form-label">Upload Doctor Image</label>
    <input type="file" name="image" class="form-control mb-3">

    <button type="submit" class="btn btn-primary w-100 mt-3">Add Doctor</button>
</form>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</body>
</html>
