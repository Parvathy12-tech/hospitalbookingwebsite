<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card-box {
            border-radius: 15px;
            padding: 20px;
            color: white;
            text-align: center;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: scale(1.05);
        }

        .card-box h2 {
            font-weight: bold;
        }

        .card-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-4">

    <h3 class="mb-4">📊 Admin Dashboard</h3>

    <div class="row g-4">

        <!-- Doctors -->
        <div class="col-md-3">
            <div class="bg-primary card-box">
                <div class="card-icon">👨‍⚕️</div>
                <h5>Doctors</h5>
                <h2>{{ doctors_count }}</h2>
                <a href="/doctors/" class="btn btn-light mt-2">Manage</a>
            </div>
        </div>

        <!-- Users -->
        <div class="col-md-3">
            <div class="bg-success card-box">
                <div class="card-icon">👥</div>
                <h5>Users</h5>
                <h2>{{ users_count }}</h2>
                <a href="/user/" class="btn btn-light mt-2">Manage</a>
            </div>
        </div>

        <!-- Appointments -->
        <div class="col-md-3">
            <div class="bg-warning card-box">
                <div class="card-icon">📅</div>
                <h5>Appointments</h5>
                <h2>{{ appointments_count }}</h2>
                <a href="/appointments/" class="btn btn-light mt-2">View</a>
            </div>
        </div>

        <!-- Today -->
        <div class="col-md-3">
            <div class="bg-danger card-box">
                <div class="card-icon">⏰</div>
                <h5>Today</h5>
                <h2>{{ today_count }}</h2>
                <a href="/reports/" class="btn btn-light mt-2">Details</a>
            </div>
        </div>

    </div>

    <!-- Reports -->
    <div class="mt-5">
        <h4>📊 Reports</h4>

        <div class="card p-3 shadow-sm">
            <p><strong>System Overview:</strong> All hospital activities summary</p>
            <a href="/reports/" class="btn btn-primary">View Full Report</a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
